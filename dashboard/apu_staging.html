<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APU Staging Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-deep:#08090c;--bg-panel:#0e1017;--bg-card:#131620;--bg-inset:#0a0c12;
    --gold:#d4a017;--gold-dim:#8b6914;--gold-glow:#d4a01740;--gold-bright:#f0c040;
    --cyan:#00d4cc;--cyan-dim:#007a75;--cyan-glow:#00d4cc35;
    --purple:#a855f7;--purple-dim:#6b21a8;--purple-glow:#a855f730;
    --warm-gray:#5a5e6b;--warm-gray-dim:#3a3d46;
    --cold-blue:#3b82f6;--cold-blue-dim:#1e40af;--cold-blue-glow:#3b82f625;
    --red:#ef4444;--red-glow:#ef444440;
    --text-primary:#e8e0d0;--text-secondary:#8a8474;--text-dim:#554f42;
    --border:#1e2030;--border-gold:#d4a01720;
    --radius:6px;
  }
  html{font-size:15px}
  body{
    background:var(--bg-deep);color:var(--text-primary);
    font-family:'JetBrains Mono',monospace;min-height:100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%,#d4a01706 0%,transparent 70%),
      repeating-linear-gradient(0deg,transparent,transparent 60px,#ffffff01 60px,#ffffff01 61px),
      repeating-linear-gradient(90deg,transparent,transparent 60px,#ffffff01 60px,#ffffff01 61px);
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00000008 2px,#00000008 4px);
  }

  .shell{max-width:1360px;margin:0 auto;padding:24px 28px 40px}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .logo-group{display:flex;align-items:center;gap:14px}
  .sigil{
    width:38px;height:38px;position:relative;
    border:2px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 12px var(--gold-glow),inset 0 0 8px var(--gold-glow);
    animation:sigil-breathe 4s ease-in-out infinite;
  }
  .sigil::before{content:'⬡';color:var(--gold);font-size:16px}
  @keyframes sigil-breathe{0%,100%{box-shadow:0 0 12px var(--gold-glow),inset 0 0 8px var(--gold-glow)}50%{box-shadow:0 0 20px var(--gold-glow),inset 0 0 14px var(--gold-glow)}}
  h1{font-family:'Oxanium',sans-serif;font-weight:600;font-size:1.4rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
  .header-sub{font-size:.65rem;color:var(--text-dim);letter-spacing:2px;margin-top:2px}

  .status-cluster{display:flex;align-items:center;gap:16px}
  .mode-badge{
    font-size:.6rem;letter-spacing:2px;text-transform:uppercase;
    padding:4px 10px;border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);
  }
  .mode-badge.alert{border-color:var(--red);color:var(--red)}

  .pulse-group{display:flex;align-items:center;gap:7px;font-size:.6rem;color:var(--text-secondary)}
  .pulse-dot{
    width:7px;height:7px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 6px var(--gold-glow);animation:pulse 2s ease-in-out infinite;
  }
  .pulse-dot.connecting{background:#f59e0b;box-shadow:0 0 6px #f59e0b40;animation:pulse-fast 1s ease-in-out infinite}
  .pulse-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red-glow);animation:none}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  @keyframes pulse-fast{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

  /* GPU CARDS */
  .gpu-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  .gpu-card{
    background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;position:relative;overflow:hidden;transition:border-color .4s;
  }
  .gpu-card:hover{border-color:var(--border-gold)}
  .gpu-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
  }
  .gpu-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .gpu-id{font-family:'Oxanium',sans-serif;font-size:.65rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:3px}
  .gpu-name{font-family:'Oxanium',sans-serif;font-size:1rem;font-weight:600;color:var(--text-primary)}
  .gpu-role{font-size:.55rem;color:var(--gold-dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .gpu-metrics{display:flex;gap:14px;align-items:flex-start}
  .metric{text-align:right}
  .metric-val{font-size:1rem;font-weight:500;color:var(--text-primary);line-height:1}
  .metric-val.hot{color:var(--red)}
  .metric-label{font-size:.55rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

  .vram-gauge{margin-bottom:16px}
  .vram-gauge-header{display:flex;justify-content:space-between;margin-bottom:5px}
  .vram-gauge-label{font-size:.6rem;color:var(--text-secondary);letter-spacing:1px}
  .vram-gauge-pct{font-size:.7rem;color:var(--gold);font-weight:500}
  .vram-bar-track{height:6px;background:var(--bg-inset);border-radius:3px;overflow:hidden;border:1px solid #ffffff06}
  .vram-bar-fill{
    height:100%;border-radius:3px;transition:width .8s cubic-bezier(.22,1,.36,1);
    background:linear-gradient(90deg,var(--gold-dim),var(--gold));
    box-shadow:0 0 8px var(--gold-glow);
  }
  .vram-bar-fill.critical{background:linear-gradient(90deg,#b91c1c,var(--red));box-shadow:0 0 8px var(--red-glow)}

  /* Model blocks */
  .model-stack{display:flex;flex-direction:column;gap:6px}
  .model-block{
    position:relative;padding:10px 12px;border-radius:4px;
    border-left:3px solid;transition:all .5s cubic-bezier(.22,1,.36,1);
    animation:block-in .4s ease-out backwards;
  }
  .model-block:nth-child(1){animation-delay:.05s}
  .model-block:nth-child(2){animation-delay:.1s}
  .model-block:nth-child(3){animation-delay:.15s}
  .model-block:nth-child(4){animation-delay:.2s}
  .model-block:nth-child(5){animation-delay:.25s}
  @keyframes block-in{from{opacity:0;transform:translateX(-8px)}}

  .model-block.tier-RESIDENT{border-color:var(--gold);background:#d4a01708}
  .model-block.tier-USER_ACTIVE{border-color:var(--cyan);background:#00d4cc08}
  .model-block.tier-AGENT{border-color:var(--purple);background:#a855f708}
  .model-block.tier-WARM{border-color:var(--warm-gray);background:#5a5e6b08}
  .model-block.tier-COLD{border-color:var(--cold-blue-dim);background:#3b82f608}
  .model-block.tier-NOT_DOWNLOADED{border-color:#2a2d36;background:#ffffff04}

  .model-top{display:flex;justify-content:space-between;align-items:center}
  .model-name{font-size:.75rem;font-weight:500;color:var(--text-primary)}
  .model-vram{font-size:.65rem;color:var(--text-secondary)}
  .model-bottom{display:flex;gap:8px;margin-top:4px;align-items:center;flex-wrap:wrap}
  .tier-tag{
    font-size:.5rem;letter-spacing:1.5px;text-transform:uppercase;
    padding:1px 6px;border-radius:2px;font-weight:600;
  }
  .tier-tag.RESIDENT{color:var(--gold);background:var(--gold-glow)}
  .tier-tag.USER_ACTIVE{color:var(--cyan);background:var(--cyan-glow)}
  .tier-tag.AGENT{color:var(--purple);background:var(--purple-glow)}
  .tier-tag.WARM{color:var(--warm-gray);background:#5a5e6b18}
  .tier-tag.COLD{color:var(--cold-blue);background:var(--cold-blue-glow)}
  .tier-tag.NOT_DOWNLOADED{color:#555;background:#ffffff08}
  .owner-tag{font-size:.5rem;color:var(--text-dim);letter-spacing:1px}
  .swap-tag{font-size:.5rem;color:var(--cyan-dim);letter-spacing:.5px}

  .model-pct-bar{
    position:absolute;bottom:0;left:0;height:2px;border-radius:0 0 0 4px;
    transition:width .8s ease;opacity:.4;
  }
  .tier-RESIDENT .model-pct-bar{background:var(--gold)}
  .tier-USER_ACTIVE .model-pct-bar{background:var(--cyan)}
  .tier-AGENT .model-pct-bar{background:var(--purple)}
  .tier-WARM .model-pct-bar{background:var(--warm-gray)}
  .tier-COLD .model-pct-bar{background:var(--cold-blue)}

  .no-models{font-size:.65rem;color:var(--text-dim);font-style:italic;padding:8px 0}

  /* STAGING SECTIONS */
  .staging{
    background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;margin-bottom:20px;
  }
  .staging-header{
    font-family:'Oxanium',sans-serif;font-size:.7rem;letter-spacing:2px;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .staging-header .count{color:var(--text-secondary);font-size:.65rem}
  .staging-header::before{content:'';width:20px;height:1px;background:var(--warm-gray)}
  .staging-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
  .staging-empty{font-size:.65rem;color:var(--text-dim);font-style:italic}

  .cold-section{
    background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;margin-bottom:20px;
  }
  .cold-header{
    font-family:'Oxanium',sans-serif;font-size:.7rem;letter-spacing:2px;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .cold-header::before{content:'';width:20px;height:1px;background:var(--cold-blue-dim)}

  /* RAM BAR */
  .ram-section{
    background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 20px;
  }
  .ram-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .ram-label{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
  .ram-stats{font-size:.65rem;color:var(--text-secondary)}
  .ram-bar-track{height:4px;background:var(--bg-inset);border-radius:2px;overflow:hidden}
  .ram-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3a3d46,var(--warm-gray));transition:width .8s ease}

  /* CONNECTING STATE */
  .connecting-overlay{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:60px 20px;text-align:center;
  }
  .connecting-overlay .conn-title{
    font-family:'Oxanium',sans-serif;font-size:.9rem;letter-spacing:3px;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;
  }
  .connecting-overlay .conn-sub{font-size:.6rem;color:var(--text-dim);letter-spacing:1px}
  .connecting-spinner{
    width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);
    border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:800px){
    .gpu-grid{grid-template-columns:1fr}
    .shell{padding:16px}
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo-group">
      <div class="sigil"></div>
      <div>
        <h1>APU Staging</h1>
        <div class="header-sub">Alchemy Processing Unit — Live Orchestration</div>
      </div>
    </div>
    <div class="status-cluster">
      <div class="mode-badge" id="modeBadge">—</div>
      <div class="pulse-group">
        <div class="pulse-dot connecting" id="pulseDot"></div>
        <span id="statusText">CONNECTING</span>
      </div>
    </div>
  </header>

  <div id="mainContent">
    <div class="connecting-overlay" id="connectingState">
      <div class="connecting-spinner"></div>
      <div class="conn-title">Connecting to APU</div>
      <div class="conn-sub">Waiting for Alchemy server on :8000</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/v1/apu/status';
const POLL_MS = 2000;

// Swap time estimates (MB/s rates)
const SWAP_RATES = {
  RAM_TO_GPU: 3000,   // ~3 GB/s PCIe — RAM to VRAM promotion
  DISK_TO_RAM: 800,   // ~800 MB/s NVMe read
  DISK_TO_GPU: 500,   // ~500 MB/s effective disk→VRAM (load + init)
};

let state = 'connecting'; // connecting | live | offline
let wasLive = false;
let lastData = null;
let lastHash = '';

function formatMB(mb) {
  return mb >= 1024 ? (mb / 1024).toFixed(1) + ' GB' : mb + ' MB';
}
function pct(used, total) {
  return total > 0 ? Math.round((used / total) * 100) : 0;
}
function timeAgo(iso) {
  if (!iso) return null;
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 0) return 'just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}
function estimateSwap(vram_mb, from) {
  if (from === 'CPU_RAM') {
    const secs = vram_mb / SWAP_RATES.RAM_TO_GPU;
    return secs < 1 ? '<1s' : '~' + Math.ceil(secs) + 's';
  }
  if (from === 'DISK' || from === 'NOT_DOWNLOADED') {
    const secs = vram_mb / SWAP_RATES.DISK_TO_GPU;
    return secs < 1 ? '<1s' : '~' + Math.ceil(secs) + 's';
  }
  return null;
}

function norm(m) {
  // Normalize API fields to dashboard format
  return {
    ...m,
    location: (m.current_location || m.location || '').toUpperCase(),
    tier: (m.current_tier || m.tier || 'warm').toUpperCase(),
  };
}

function modelBlock(m, gpuTotal) {
  m = norm(m);
  const pctW = gpuTotal > 0 ? Math.round((m.vram_mb / gpuTotal) * 100) : 0;
  const tier = m.tier || 'WARM';
  const ago = timeAgo(m.last_used);
  const swap = estimateSwap(m.vram_mb, m.location);
  return `
    <div class="model-block tier-${tier}">
      <div class="model-top">
        <span class="model-name">${m.display_name || m.name}</span>
        <span class="model-vram">${formatMB(m.vram_mb)}</span>
      </div>
      <div class="model-bottom">
        <span class="tier-tag ${tier}">${tier}</span>
        ${m.owner_app ? `<span class="owner-tag">▸ ${m.owner_app}</span>` : ''}
        ${ago ? `<span class="owner-tag">${ago}</span>` : ''}
        ${swap ? `<span class="swap-tag">swap: ${swap}</span>` : ''}
      </div>
      ${gpuTotal > 0 ? `<div class="model-pct-bar" style="width:${pctW}%"></div>` : ''}
    </div>`;
}

function renderGPU(gpu, models) {
  const p = pct(gpu.used_vram_mb, gpu.total_vram_mb);
  const critical = p > 90;
  const hot = gpu.temperature_c > 80;
  const role = gpu.role || '';
  const gpuModels = models
    .filter(m => norm(m).location === `GPU_${gpu.index}`)
    .sort((a, b) => b.vram_mb - a.vram_mb);

  return `
    <div class="gpu-card">
      <div class="gpu-header">
        <div>
          <div class="gpu-id">GPU ${gpu.index}</div>
          <div class="gpu-name">${gpu.name}</div>
          ${role ? `<div class="gpu-role">${role} stack</div>` : ''}
        </div>
        <div class="gpu-metrics">
          <div class="metric">
            <div class="metric-val ${hot ? 'hot' : ''}">${gpu.temperature_c}°</div>
            <div class="metric-label">Temp</div>
          </div>
          <div class="metric">
            <div class="metric-val">${gpu.utilization_pct}%</div>
            <div class="metric-label">Util</div>
          </div>
        </div>
      </div>
      <div class="vram-gauge">
        <div class="vram-gauge-header">
          <span class="vram-gauge-label">VRAM ${formatMB(gpu.used_vram_mb)} / ${formatMB(gpu.total_vram_mb)}</span>
          <span class="vram-gauge-pct">${p}%</span>
        </div>
        <div class="vram-bar-track">
          <div class="vram-bar-fill ${critical ? 'critical' : ''}" style="width:${p}%"></div>
        </div>
      </div>
      <div class="model-stack">
        ${gpuModels.length ? gpuModels.map(m => modelBlock(m, gpu.total_vram_mb)).join('') : '<div class="no-models">No models loaded</div>'}
      </div>
    </div>`;
}

function renderFull(data) {
  const models = data.models || [];
  const warmModels = models.filter(m => norm(m).location === 'CPU_RAM');
  const coldModels = models.filter(m => { const loc = norm(m).location; return loc === 'DISK' || loc === 'NOT_DOWNLOADED'; });

  let html = `<div class="gpu-grid">${
    (data.gpus || []).sort((a, b) => a.index - b.index).map(gpu => renderGPU(gpu, models)).join('')
  }</div>`;

  // Warm staging (CPU RAM)
  html += `<div class="staging">
    <div class="staging-header">Staging Area — CPU RAM <span class="count">(${warmModels.length} model${warmModels.length !== 1 ? 's' : ''})</span></div>
    <div class="staging-grid">
      ${warmModels.length
        ? warmModels.sort((a, b) => b.vram_mb - a.vram_mb).map(m => modelBlock(m, 0)).join('')
        : '<div class="staging-empty">No models in CPU RAM — all loaded to GPU or on disk</div>'}
    </div>
  </div>`;

  // Cold storage (DISK + NOT_DOWNLOADED) — always visible
  html += `<div class="cold-section">
    <div class="cold-header">Cold Storage — Disk <span class="count">(${coldModels.length} model${coldModels.length !== 1 ? 's' : ''})</span></div>
    <div class="staging-grid">
      ${coldModels.length
        ? coldModels.sort((a, b) => b.vram_mb - a.vram_mb).map(m => modelBlock(m, 0)).join('')
        : '<div class="staging-empty">No models in cold storage — all promoted to RAM or GPU</div>'}
    </div>
  </div>`;

  // RAM bar
  if (data.ram) {
    const rp = pct(data.ram.used_mb, data.ram.total_mb);
    html += `<div class="ram-section">
      <div class="ram-header">
        <span class="ram-label">System RAM</span>
        <span class="ram-stats">${formatMB(data.ram.used_mb)} / ${formatMB(data.ram.total_mb)} (${rp}%)</span>
      </div>
      <div class="ram-bar-track"><div class="ram-bar-fill" style="width:${rp}%"></div></div>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  // Mode badge
  const badge = document.getElementById('modeBadge');
  const mode = (data.mode || 'normal').toUpperCase();
  badge.textContent = mode;
  badge.className = 'mode-badge' + (mode !== 'NORMAL' ? ' alert' : '');
}

function setState(s) {
  if (state === s) return;
  state = s;
  const dot = document.getElementById('pulseDot');
  const text = document.getElementById('statusText');
  if (s === 'live') {
    dot.className = 'pulse-dot';
    text.textContent = 'LIVE';
    wasLive = true;
  } else if (s === 'connecting') {
    dot.className = 'pulse-dot connecting';
    text.textContent = 'CONNECTING';
  } else {
    dot.className = 'pulse-dot offline';
    text.textContent = 'OFFLINE';
  }
}

async function poll() {
  try {
    const r = await fetch(API, { signal: AbortSignal.timeout(4000) });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    setState('live');
    lastData = data;
    const hash = JSON.stringify(data);
    if (hash !== lastHash) {
      lastHash = hash;
      renderFull(data);
    }
  } catch {
    // If we were live before, show offline. Otherwise keep showing connecting.
    if (wasLive) {
      setState('offline');
    } else {
      setState('connecting');
      // Show connecting overlay if no data yet
      if (!lastData) {
        document.getElementById('mainContent').innerHTML = `
          <div class="connecting-overlay">
            <div class="connecting-spinner"></div>
            <div class="conn-title">Connecting to APU</div>
            <div class="conn-sub">Waiting for Alchemy server on :8000</div>
          </div>`;
      }
    }
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
