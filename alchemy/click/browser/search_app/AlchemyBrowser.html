<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchemy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #FFFFFF;
      --bg-subtle:     #F7F7F7;
      --bg-hover:      #F2F2F2;
      --border:        #E3E3E3;
      --border-focus:  #1A56DB;
      --text-1:        #0A0A0A;
      --text-2:        #4B4B4B;
      --text-3:        #909090;
      --accent:        #1A56DB;
      --accent-hover:  #1447C0;
      --ai-text:       #3730A3;
      --ai-bg:         #F0F1FF;
      --ai-border:     #C7D2FE;
      --url-green:     #196830;
      --skeleton:      #EBEBEB;
      --skeleton-shine:#F5F5F5;
      --font:          'Figtree', system-ui, sans-serif;
      --mono:          'JetBrains Mono', 'Courier New', monospace;
      --radius:        6px;
      --transition:    140ms ease;
    }
    [data-theme="dark"] {
      --bg:            #141414;
      --bg-subtle:     #1E1E1E;
      --bg-hover:      #262626;
      --border:        #2E2E2E;
      --border-focus:  #60A5FA;
      --text-1:        #F0F0F0;
      --text-2:        #A0A0A0;
      --text-3:        #555555;
      --accent:        #60A5FA;
      --accent-hover:  #93C5FD;
      --ai-text:       #A5B4FC;
      --ai-bg:         #1E1B4B;
      --ai-border:     #3730A3;
      --url-green:     #4ADE80;
      --skeleton:      #252525;
      --skeleton-shine:#2E2E2E;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── PAGES ── */
    #home-page, #results-page {
      position: absolute;
      inset: 0;
      transition: opacity 280ms ease, transform 280ms ease;
    }
    #home-page.hidden, #results-page.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #home-page.hidden { transform: translateY(-12px); }
    #results-page { opacity: 0; transform: translateY(8px); }
    #results-page.visible { opacity: 1; transform: translateY(0); }

    /* ── SHARED HEADER ── */
    .site-header {
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-1);
      text-decoration: none;
      flex-shrink: 0;
      cursor: pointer;
    }
    .logo span { color: var(--accent); }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text-1); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ── SEARCH BAR ── */
    .search-wrap { position: relative; width: 100%; }
    .search-bar {
      display: flex;
      align-items: center;
      height: 50px;
      border: 1.5px solid var(--border);
      border-radius: 25px;
      padding: 0 8px 0 18px;
      background: var(--bg);
      gap: 8px;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }
    .search-bar:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--border-focus) 14%, transparent);
    }
    .search-bar .icon-search {
      width: 17px;
      height: 17px;
      color: var(--text-3);
      flex-shrink: 0;
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text-1);
      min-width: 0;
    }
    .search-bar input::placeholder { color: var(--text-3); }
    .btn-mic {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      position: relative;
      flex-shrink: 0;
    }
    .btn-mic:hover { background: var(--bg-hover); color: var(--text-2); }
    .btn-mic svg { width: 16px; height: 16px; }
    .btn-mic.listening { color: #DC2626; }
    .btn-mic.listening::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #DC2626;
      animation: mic-pulse 1.2s ease infinite;
    }
    @keyframes mic-pulse {
      0%   { transform: scale(1); opacity: 0.8; }
      50%  { transform: scale(1.3); opacity: 0; }
      100% { transform: scale(1); opacity: 0; }
    }
    .btn-search {
      height: 36px;
      padding: 0 16px;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: background var(--transition);
    }
    .btn-search:hover { background: var(--accent-hover); }

    /* ── SUGGESTIONS ── */
    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: none;
      z-index: 200;
      box-shadow: 0 4px 20px color-mix(in srgb, #000 8%, transparent);
    }
    .suggestions.open { display: block; }
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-2);
      transition: background var(--transition);
    }
    .suggestion-item:hover { background: var(--bg-hover); color: var(--text-1); }
    .suggestion-item svg { width: 14px; height: 14px; color: var(--text-3); flex-shrink: 0; }

    /* ── HOME PAGE ── */
    #home-page {
      display: flex;
      flex-direction: column;
    }
    .home-header {
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 24px;
      background: var(--bg);
    }
    .home-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      padding-bottom: 120px;
    }
    .home-brand {
      margin-bottom: 40px;
      text-align: center;
    }
    .home-logo-text {
      font-size: 52px;
      font-weight: 300;
      letter-spacing: -0.05em;
      color: var(--text-1);
    }
    .home-logo-text em {
      font-style: normal;
      color: var(--accent);
    }
    .home-tagline {
      font-size: 14px;
      color: var(--text-3);
      margin-top: 6px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .home-search-wrap {
      width: 100%;
      max-width: 600px;
    }

    /* ── RESULTS PAGE ── */
    .results-header {
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .results-search-wrap {
      flex: 1;
      max-width: 580px;
    }
    .results-search-wrap .search-bar {
      height: 40px;
      border-radius: 20px;
    }
    .results-search-wrap .btn-search { height: 28px; }
    .results-search-wrap .btn-mic { width: 28px; height: 28px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      gap: 0;
    }
    .tab {
      padding: 10px 16px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color var(--transition), border-color var(--transition);
      white-space: nowrap;
    }
    .tab:hover { color: var(--text-2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── RESULTS LAYOUT ── */
    .results-body {
      width: 100%;
      margin: 0 auto;
      padding: 20px 24px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    #results-main {
      min-width: 0;  /* allow flex/grid children to shrink below content size */
      overflow: hidden;
    }
    @media (max-width: 768px) {
      .results-body { grid-template-columns: 1fr; }
      .ai-feed-panel { position: static; }
    }

    /* ── AI ANSWER (right panel) ── */
    .ai-answer-typing::after {
      content: '▌';
      animation: blink 0.8s infinite;
      color: var(--ai-text);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── RESULTS META ── */
    .results-meta {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .ai-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ai-text);
      margin-bottom: 20px;
      opacity: 0;
      transition: opacity 400ms ease;
    }
    .ai-status.visible { opacity: 1; }
    .ai-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ai-text);
      animation: status-blink 1.4s ease infinite;
    }
    @keyframes status-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .ai-status.done .ai-status-dot { animation: none; }
    .ai-status.done { color: var(--text-3); }

    /* ── RESULT ITEM ── */
    .result-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(6px);
      transition: background var(--transition);
      min-width: 0;
      overflow: hidden;
    }
    .result-item.loaded {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 240ms ease, transform 240ms ease, background var(--transition);
    }
    .result-item:hover { background: transparent; }
    .result-item:last-child { border-bottom: none; }

    .result-domain {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
      min-width: 0;
      overflow: hidden;
    }
    .result-favicon {
      width: 16px; height: 16px;
      border-radius: 3px;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      color: var(--text-3);
      flex-shrink: 0;
      overflow: hidden;
    }
    .result-favicon img { width: 100%; height: 100%; object-fit: cover; }
    .result-url {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--url-green);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      line-height: 1.3;
      display: block;
      margin-bottom: 3px;
      letter-spacing: -0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-title:hover { text-decoration: underline; }
    .result-desc-wrap {
      position: relative;
    }
    .result-desc {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.5;
      transition: opacity 280ms ease;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .result-desc.swapping { opacity: 0; }
    .result-desc.ai-text {
      color: var(--ai-text);
    }
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ai-text);
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-radius: 4px;
      padding: 2px 6px;
      margin-right: 7px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 300ms ease;
      position: relative;
      top: -1px;
    }
    .ai-badge.visible {
      opacity: 1;
      animation: badge-settle 0.5s ease forwards;
    }
    @keyframes badge-settle {
      0%   { transform: scale(1.1); opacity: 0.6; }
      60%  { transform: scale(0.97); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── ENGINE BADGES ── */
    .engine-badges {
      display: inline-flex;
      gap: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .engine-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      border: 1px solid var(--border);
      color: var(--text-3);
      background: var(--bg-subtle);
    }
    .engine-badge.google  { color: #4285F4; border-color: #4285F4; background: color-mix(in srgb, #4285F4 8%, var(--bg)); }
    .engine-badge.bing    { color: #00809D; border-color: #00809D; background: color-mix(in srgb, #00809D 8%, var(--bg)); }
    .engine-badge.duckduckgo { color: #DE5833; border-color: #DE5833; background: color-mix(in srgb, #DE5833 8%, var(--bg)); }

    /* ── SKELETON ── */
    .skeleton-list { display: flex; flex-direction: column; gap: 0; }
    .skeleton-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--skeleton);
      background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.4s ease infinite;
      margin-bottom: 8px;
    }
    .skeleton-line.url   { width: 200px; height: 10px; margin-bottom: 6px; }
    .skeleton-line.title { width: 340px; height: 16px; margin-bottom: 8px; }
    .skeleton-line.desc1 { width: 100%; }
    .skeleton-line.desc2 { width: 75%; }
    @keyframes skeleton-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── AI FEED PANEL (right side) ── */
    .ai-feed-panel {
      position: sticky;
      top: 80px;
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-radius: 12px;
      padding: 20px 22px;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
      overflow-wrap: break-word;
      word-wrap: break-word;
      animation: feedFadeIn 500ms ease forwards;
    }
    @keyframes feedFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ai-feed-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ai-text);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ai-feed-header svg { width: 16px; height: 16px; }
    .ai-feed-header.done { color: var(--text-3); }
    .ai-feed-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ai-text);
      animation: status-blink 1.4s ease infinite;
      margin-left: auto;
    }
    .ai-feed-header.done .ai-feed-status-dot { animation: none; opacity: 0.3; }
    .ai-feed-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-1);
      margin-bottom: 16px;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .ai-feed-text:empty { display: none; }
    .ai-feed-text a.cite-link {
      color: inherit;
      text-decoration: none;
      cursor: text;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease, cursor 0s;
    }
    .ai-feed-text a.cite-link:hover {
      cursor: pointer;
      border-bottom-color: var(--text-3);
    }
    .ai-feed-sources {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ai-feed-source {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text-2);
      text-decoration: none;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color var(--transition), background var(--transition);
      min-width: 0;
      overflow: hidden;
    }
    .ai-feed-source:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-hover); }
    .ai-feed-source img { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .ai-feed-source-domain { font-family: var(--mono); font-size: 11px; color: var(--url-green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ai-feed-source-desc { color: var(--text-3); font-size: 11.5px; margin-left: auto; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ai-feed-skeleton {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ai-feed-skeleton .skeleton-line { border-radius: 4px; }
    .ai-feed-skeleton .skeleton-line.text1 { width: 100%; height: 12px; }
    .ai-feed-skeleton .skeleton-line.text2 { width: 90%; height: 12px; }
    .ai-feed-skeleton .skeleton-line.text3 { width: 75%; height: 12px; }
    .ai-feed-skeleton .skeleton-line.src   { width: 100%; height: 36px; border-radius: 8px; }

    /* ── MEDIA BODY (shared for video/news/images tabs) ── */
    .media-body {
      max-width: 100%;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ── VIDEO GRID ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .video-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      opacity: 0;
      transform: translateY(6px);
    }
    .video-card.loaded {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 240ms ease, transform 240ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }
    .video-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px color-mix(in srgb, var(--accent) 10%, transparent);
      transform: translateY(-2px);
    }
    .video-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-subtle);
      overflow: hidden;
    }
    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-duration {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,.82);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--mono);
    }
    .video-play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      background: rgba(0,0,0,.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 180ms ease;
    }
    .video-card:hover .video-play-icon { opacity: 1; }
    .video-play-icon svg { width: 20px; height: 20px; color: #fff; margin-left: 2px; }
    .video-info {
      padding: 12px 14px;
    }
    .video-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.3;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-meta {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .video-meta span { white-space: nowrap; }

    /* ── NEWS LIST ── */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .news-item {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
      opacity: 0;
      transform: translateY(6px);
    }
    .news-item.loaded {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 240ms ease, transform 240ms ease;
    }
    .news-item:hover { background: transparent; }
    .news-item:last-child { border-bottom: none; }
    .news-image {
      width: 180px;
      height: 110px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-subtle);
    }
    .news-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .news-content { flex: 1; min-width: 0; }
    .news-source {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .news-source-favicon {
      width: 14px; height: 14px;
      border-radius: 2px;
      overflow: hidden;
    }
    .news-source-favicon img { width: 100%; height: 100%; }
    .news-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.3;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .news-title:hover { color: var(--accent); }
    .news-body {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-date {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 6px;
    }
    @media (max-width: 600px) {
      .news-image { width: 100px; height: 70px; }
    }

    /* ── IMAGE GRID ── */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .image-card {
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      aspect-ratio: 1;
      background: var(--bg-subtle);
      opacity: 0;
      transition: opacity 240ms ease, transform 180ms ease;
    }
    .image-card.loaded { opacity: 1; }
    .image-card:hover { transform: scale(1.02); }
    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.7));
      opacity: 0;
      transition: opacity 180ms ease;
    }
    .image-card:hover .image-card-overlay { opacity: 1; }
    .image-card-title {
      font-size: 11px;
      color: #fff;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── DIVIDER ── */
    .divider { width: 1px; height: 20px; background: var(--border); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════ HOME PAGE ═══ -->

<!-- ═══════════════════════════════════════ RESULTS PAGE ═══ -->
<div id="results-page" class="hidden">
  <div class="results-header">
    <div class="logo" onclick="goHome()" style="cursor:pointer">Al<em>c</em>hemy</div>
    <div class="divider"></div>
    <div class="results-search-wrap">

  <!-- WEB TAB -->

<script>
  const API = 'http://localhost:8055';

  // ── STATE ─────────────────────────────────────────────────────────────
  let currentQuery = '';
  let isDark = false;
  let searchAbort = null;   // AbortController for in-flight searches

  // ── THEME ─────────────────────────────────────────────────────────────
  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
    const moonSVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
    const sunSVG  = `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`;
    ['home', 'results'].forEach(id => {
      const icon = document.getElementById(`theme-icon-${id}`);
      if (icon) icon.innerHTML = isDark ? moonSVG : sunSVG;
    });
  }

  // ── UTILS ───────────────────────────────────────────────────────────────
  function clamp(text, max = 180) {
    if (!text || text.length <= max) return text || '';
    return text.slice(0, max).replace(/\s+\S*$/, '') + '…';
  }

  // ── SUGGESTIONS (live DuckDuckGo autocomplete) ─────────────────────────
  let suggestTimer = null;

  async function fetchSuggestions(q) {
    if (q.length < 2) return [];
    try {
      // DuckDuckGo autocomplete (CORS-friendly endpoint via our server)
      const r = await fetch(`${API}/api/suggest?q=${encodeURIComponent(q)}`);
      if (!r.ok) return [];
      return await r.json();
    } catch { return []; }
  }

  function renderSuggestions(inputId, boxId) {
    const input = document.getElementById(inputId);
    const box   = document.getElementById(boxId);
    const q     = input.value.trim();

    clearTimeout(suggestTimer);
    if (!q) { box.classList.remove('open'); return; }

    suggestTimer = setTimeout(async () => {
      const items = await fetchSuggestions(q);
      if (!items.length) { box.classList.remove('open'); return; }
      const svgSearch = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`;
      box.innerHTML = items.slice(0, 5).map(s =>
        `<div class="suggestion-item" onclick="selectSuggestion(${JSON.stringify(s)})">${svgSearch}<span>${s}</span></div>`
      ).join('');
      box.classList.add('open');
    }, 180);
  }

  function selectSuggestion(text) {
    document.getElementById('home-input').value = text;
    document.getElementById('results-input').value = text;
    document.querySelectorAll('.suggestions').forEach(b => b.classList.remove('open'));
    doSearch();
  }

  document.getElementById('home-input').addEventListener('input', () =>
    renderSuggestions('home-input', 'home-suggestions'));
  document.getElementById('home-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
  document.getElementById('results-input').addEventListener('input', () =>
    renderSuggestions('results-input', 'results-suggestions'));
  document.getElementById('results-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap'))
      document.querySelectorAll('.suggestions').forEach(b => b.classList.remove('open'));
  });

  // ── TABS ──────────────────────────────────────────────────────────────
  let currentTab = 'web';
  const tabCache = {};   // cache tab results per query

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');

    document.querySelectorAll('.tab-content').forEach(tc => tc.style.display = 'none');
    const tabEl = document.getElementById(`tab-${tab}`);
    tabEl.style.display = tab === 'web' ? 'grid' : '';

    currentTab = tab;
    if (!currentQuery) return;

    const cacheKey = `${tab}:${currentQuery}`;
    if (tabCache[cacheKey]) return;  // already loaded

    if (tab === 'videos') loadVideos(currentQuery);
    else if (tab === 'news') loadNews(currentQuery);
    else if (tab === 'images') loadImages(currentQuery);
  }

  // ── MIC ───────────────────────────────────────────────────────────────
  function toggleMic(btn) {
    btn.classList.toggle('listening');
    if (btn.classList.contains('listening')) {
      setTimeout(() => btn.classList.remove('listening'), 3000);
    }
  }

  // ── SEARCH ────────────────────────────────────────────────────────────
  let activeInput = 'home';   // tracks which input the user is typing in

  document.getElementById('home-input').addEventListener('focus', () => activeInput = 'home');
  document.getElementById('results-input').addEventListener('focus', () => activeInput = 'results');

  function doSearch() {
    // Always read from the input the user is currently using
    const query = document.getElementById(
      activeInput === 'results' ? 'results-input' : 'home-input'
    ).value.trim();
    if (!query) return;

    document.querySelectorAll('.suggestions').forEach(b => b.classList.remove('open'));
    document.getElementById('home-input').value    = query;
    document.getElementById('results-input').value = query;
    currentQuery = query;

    // Clear tab cache for new query
    Object.keys(tabCache).forEach(k => delete tabCache[k]);

    // Always switch to web tab on new search
    switchTab('web');
    showResults(query);
  }

  function goHome() {
    const home    = document.getElementById('home-page');
    const results = document.getElementById('results-page');
    if (searchAbort) { searchAbort.abort(); searchAbort = null; }
    results.classList.remove('visible');
    results.classList.add('hidden');
    home.classList.remove('hidden');
    document.getElementById('home-input').value = '';
    document.getElementById('ai-feed-panel').style.display = 'none';
    document.getElementById('ai-feed-text').innerHTML = '';
    document.getElementById('ai-feed-sources').innerHTML = '';
    document.getElementById('ai-feed-skeleton').innerHTML = '';
    activeInput = 'home';
    setTimeout(() => results.style.display = 'none', 300);
  }

  async function showResults(query) {
    // Cancel any previous search
    if (searchAbort) searchAbort.abort();
    searchAbort = new AbortController();
    const signal = searchAbort.signal;

    const home    = document.getElementById('home-page');
    const results = document.getElementById('results-page');
    home.classList.add('hidden');
    results.style.display = '';
    results.classList.remove('hidden');
    requestAnimationFrame(() => results.classList.add('visible'));

    document.getElementById('results-meta').textContent = 'Searching…';

    // Reset AI feed panel
    document.getElementById('ai-feed-panel').style.display = 'none';
    document.getElementById('ai-feed-text').innerHTML = '';
    document.getElementById('ai-feed-sources').innerHTML = '';
    document.getElementById('ai-feed-skeleton').innerHTML = '';

    // AI status
    const aiStatus = document.getElementById('ai-status');
    aiStatus.classList.remove('done');
    aiStatus.classList.add('visible');
    document.getElementById('ai-status-text').textContent = 'Fetching results…';

    // Skeletons
    const skList = document.getElementById('skeleton-list');
    skList.innerHTML = Array(8).fill(0).map(() => `
      <div class="skeleton-item">
        <div class="skeleton-line url"></div>
        <div class="skeleton-line title"></div>
        <div class="skeleton-line desc1"></div>
        <div class="skeleton-line desc2"></div>
      </div>
    `).join('');
    document.getElementById('results-list').innerHTML = '';

    // ── Fetch real search results ──
    let items = [];
    try {
      const t0 = Date.now();
      const resp = await fetch(`${API}/api/search?q=${encodeURIComponent(query)}&count=10`, { signal });
      const data = await resp.json();
      items = data.results || [];
      const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
      const enginesUsed = (data.engines || ['duckduckgo']).join(' + ');
      document.getElementById('results-meta').textContent =
        `${data.count} results via ${enginesUsed} (${elapsed}s)`;
    } catch (err) {
      if (err.name === 'AbortError') return;
      skList.innerHTML = '';
      document.getElementById('results-list').innerHTML =
        `<div style="color:var(--text-3);padding:40px 0;font-size:14px;">
          Could not reach AlchemyBrowser server.<br>
          <span style="font-size:12px;opacity:.6">Make sure StartBrowser.bat is running at localhost:8055</span>
        </div>`;
      aiStatus.classList.remove('visible');
      return;
    }

    // ── Render results ──
    skList.innerHTML = '';
    if (!items.length) {
      document.getElementById('results-list').innerHTML =
        `<div style="color:var(--text-3);padding:40px 0;font-size:14px;">No results found.</div>`;
      aiStatus.classList.remove('visible');
      return;
    }

    document.getElementById('ai-status-text').textContent = 'AI is analyzing results…';

    const list = document.getElementById('results-list');
    list.innerHTML = '';
    let swappedCount = 0;

    items.forEach((r, i) => {
      const item = document.createElement('div');
      item.className = 'result-item';
      const displayUrl = r.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
      const engineBadges = (r.engines || []).map(e => {
        const label = e === 'google' ? 'G' : e === 'bing' ? 'B' : 'D';
        return `<span class="engine-badge ${e}" title="${e}">${label}</span>`;
      }).join('');
      item.innerHTML = `
        <div class="result-domain">
          <div class="result-favicon">
            <img src="${r.favicon_url}" onerror="this.parentElement.textContent='${(r.domain[0]||'?').toUpperCase()}'">
          </div>
          <div class="result-url">${displayUrl}</div>
          <span class="engine-badges">${engineBadges}</span>
        </div>
        <a class="result-title" href="${r.url}" target="_blank" rel="noopener">${r.title}</a>
        <div class="result-desc-wrap">
          <span class="ai-badge" id="badge-${i}">AI</span><span class="result-desc" id="desc-${i}">${clamp(r.description)}</span>
        </div>
      `;
      list.appendChild(item);
      setTimeout(() => item.classList.add('loaded'), i * 60);

      // Fire AI summarize in parallel, stagger start slightly so they don't all hit at once
      setTimeout(() => {
        if (signal.aborted) return;
        fetchSummary(r.url, r.description, query, signal).then(aiText => {
          if (signal.aborted || !aiText) return;
          swapDescription(i, aiText);
          swappedCount++;
          if (swappedCount === items.length) {
            document.getElementById('ai-status-text').textContent =
              `AI analysis complete — ${swappedCount} results enhanced`;
            aiStatus.classList.add('done');
          }
        });
      }, i * 300);
    });

    // Fire AI feed panel async (right side)
    fetchAIFeed(query, items, signal);
  }

  // ── AI Summary ────────────────────────────────────────────────────────
  async function fetchSummary(url, originalDesc, query, signal) {
    try {
      const resp = await fetch(`${API}/api/summarize`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, original_desc: originalDesc, query }),
        signal,
      });
      if (!resp.ok) return null;
      const data = await resp.json();
      return data.ai_text || null;
    } catch { return null; }
  }

  function swapDescription(index, aiText) {
    const desc  = document.getElementById(`desc-${index}`);
    const badge = document.getElementById(`badge-${index}`);
    if (!desc || !aiText.trim()) return;

    desc.style.transition = 'opacity 250ms ease';
    desc.style.opacity = '0';
    setTimeout(() => {
      desc.textContent = aiText;
      desc.classList.add('ai-text');
      badge.classList.add('visible');
      desc.style.opacity = '1';
    }, 260);
  }

  // ── VIDEOS TAB ──────────────────────────────────────────────────────
  async function loadVideos(query) {
    const meta = document.getElementById('videos-meta');
    const list = document.getElementById('videos-list');
    meta.textContent = 'Loading videos…';
    list.innerHTML = '';
    const cacheKey = `videos:${query}`;

    try {
      const t0 = Date.now();
      const resp = await fetch(`${API}/api/videos?q=${encodeURIComponent(query)}&count=12`);
      const data = await resp.json();
      const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
      meta.textContent = `${data.count} videos (${elapsed}s)`;
      tabCache[cacheKey] = true;

      if (!data.results.length) {
        list.innerHTML = '<div style="color:var(--text-3);padding:40px 0">No videos found.</div>';
        return;
      }

      const playSvg = '<svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>';

      data.results.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.onclick = () => window.open(v.url, '_blank');

        const views = v.views ? `${Number(v.views).toLocaleString()} views` : '';
        const published = v.published ? new Date(v.published).toLocaleDateString() : '';

        card.innerHTML = `
          <div class="video-thumb">
            <img src="${v.thumbnail}" onerror="this.style.display='none'" alt="">
            <div class="video-play-icon">${playSvg}</div>
            ${v.duration ? `<div class="video-duration">${v.duration}</div>` : ''}
          </div>
          <div class="video-info">
            <div class="video-title">${v.title}</div>
            <div class="video-meta">
              ${v.uploader ? `<span>${v.uploader}</span>` : ''}
              ${views ? `<span>${views}</span>` : ''}
              ${published ? `<span>${published}</span>` : ''}
            </div>
          </div>
        `;
        list.appendChild(card);
        setTimeout(() => card.classList.add('loaded'), i * 60);
      });
    } catch {
      meta.textContent = '';
      list.innerHTML = '<div style="color:var(--text-3);padding:40px 0">Could not load videos.</div>';
    }
  }

  // ── NEWS TAB ───────────────────────────────────────────────────────
  async function loadNews(query) {
    const meta = document.getElementById('news-meta');
    const list = document.getElementById('news-list');
    meta.textContent = 'Loading news…';
    list.innerHTML = '';
    const cacheKey = `news:${query}`;

    try {
      const t0 = Date.now();
      const resp = await fetch(`${API}/api/news?q=${encodeURIComponent(query)}&count=10`);
      const data = await resp.json();
      const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
      meta.textContent = `${data.count} articles (${elapsed}s)`;
      tabCache[cacheKey] = true;

      if (!data.results.length) {
        list.innerHTML = '<div style="color:var(--text-3);padding:40px 0">No news found.</div>';
        return;
      }

      data.results.forEach((n, i) => {
        const item = document.createElement('div');
        item.className = 'news-item';
        item.onclick = () => window.open(n.url, '_blank');

        const timeAgo = n.date ? formatTimeAgo(n.date) : '';
        const faviconUrl = `https://www.google.com/s2/favicons?domain=${n.domain}&sz=32`;

        item.innerHTML = `
          ${n.image ? `<div class="news-image"><img src="${n.image}" onerror="this.parentElement.style.display='none'" alt=""></div>` : ''}
          <div class="news-content">
            <div class="news-source">
              <div class="news-source-favicon"><img src="${faviconUrl}" alt=""></div>
              ${n.source || n.domain}
            </div>
            <div class="news-title">${n.title}</div>
            <div class="news-body">${n.body}</div>
            ${timeAgo ? `<div class="news-date">${timeAgo}</div>` : ''}
          </div>
        `;
        list.appendChild(item);
        setTimeout(() => item.classList.add('loaded'), i * 60);
      });
    } catch {
      meta.textContent = '';
      list.innerHTML = '<div style="color:var(--text-3);padding:40px 0">Could not load news.</div>';
    }
  }

  function formatTimeAgo(dateStr) {
    try {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr || '';
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 0) return d.toLocaleDateString();
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
      return d.toLocaleDateString();
    } catch { return dateStr || ''; }
  }

  // ── IMAGES TAB ─────────────────────────────────────────────────────
  async function loadImages(query) {
    const meta = document.getElementById('images-meta');
    const list = document.getElementById('images-list');
    meta.textContent = 'Loading images…';
    list.innerHTML = '';
    const cacheKey = `images:${query}`;

    try {
      const t0 = Date.now();
      const resp = await fetch(`${API}/api/images?q=${encodeURIComponent(query)}&count=20`);
      const data = await resp.json();
      const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
      meta.textContent = `${data.count} images (${elapsed}s)`;
      tabCache[cacheKey] = true;

      if (!data.results.length) {
        list.innerHTML = '<div style="color:var(--text-3);padding:40px 0">No images found. Image search may be temporarily unavailable.</div>';
        return;
      }

      data.results.forEach((img, i) => {
        const card = document.createElement('div');
        card.className = 'image-card';
        card.onclick = () => window.open(img.url || img.image, '_blank');
        card.innerHTML = `
          <img src="${img.thumbnail || img.image}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>';" alt="${img.title}">
          <div class="image-card-overlay">
            <div class="image-card-title">${img.title}</div>
          </div>
        `;
        list.appendChild(card);
        setTimeout(() => card.classList.add('loaded'), i * 30);
      });
    } catch {
      meta.textContent = '';
      list.innerHTML = '<div style="color:var(--text-3);padding:40px 0">Could not load images.</div>';
    }
  }

  // ── AI FEED (right panel — answer + sources) ───────────────────────
  async function fetchAIFeed(query, items, signal) {
    const panel   = document.getElementById('ai-feed-panel');
    const header  = document.getElementById('ai-feed-header');
    const skeleton = document.getElementById('ai-feed-skeleton');
    const textEl  = document.getElementById('ai-feed-text');
    const srcEl   = document.getElementById('ai-feed-sources');

    if (!items.length) return;

    // Show panel with skeleton
    panel.style.display = '';
    header.classList.remove('done');
    textEl.innerHTML = '';
    srcEl.innerHTML = '';
    skeleton.innerHTML = `
      <div class="skeleton-line text1"></div>
      <div class="skeleton-line text2"></div>
      <div class="skeleton-line text3"></div>
      <div class="skeleton-line text1"></div>
      <div class="skeleton-line text2"></div>
      <div style="height:8px"></div>
      <div class="skeleton-line src"></div>
      <div class="skeleton-line src"></div>
      <div class="skeleton-line src"></div>
    `;

    const payload = items.slice(0, 5).map(r => ({
      url: r.url, title: r.title, description: r.description
    }));

    try {
      const resp = await fetch(`${API}/api/ai-answer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, results: payload }),
        signal,
      });
      if (!resp.ok) throw new Error('AI feed failed');
      const data = await resp.json();
      if (signal.aborted) return;

      skeleton.innerHTML = '';

      if (!data.answer) {
        panel.style.display = 'none';
        return;
      }

      // Typing animation — word by word first, then link sentences to sources
      textEl.classList.add('ai-answer-typing');
      const words = data.answer.split(' ');
      let shown = '';
      for (let i = 0; i < words.length; i++) {
        if (signal.aborted) return;
        shown += (i ? ' ' : '') + words[i];
        textEl.textContent = shown;
        await new Promise(r => setTimeout(r, 20));
      }
      textEl.classList.remove('ai-answer-typing');

      // After typing completes, silently link sentences to sources
      const sources = data.sources || [];
      if (sources.length && sources[0].snippet) {
        const sentences = data.answer.split(/(?<=[.!?])\s+/).filter(s => s.trim());
        const linked = sentences.map(sentence => {
          // Find best matching source by word overlap
          const sWords = new Set(sentence.toLowerCase().split(/\W+/).filter(w => w.length > 3));
          let bestIdx = 0, bestScore = 0;
          sources.forEach((src, idx) => {
            const srcText = (src.snippet + ' ' + src.title).toLowerCase();
            const srcWords = new Set(srcText.split(/\W+/).filter(w => w.length > 3));
            let score = 0;
            sWords.forEach(w => { if (srcWords.has(w)) score++; });
            if (score > bestScore) { bestScore = score; bestIdx = idx; }
          });
          if (bestScore > 0) {
            const s = sources[bestIdx];
            return `<a class="cite-link" href="${s.url}" target="_blank" rel="noopener" title="${s.domain}">${sentence}</a>`;
          }
          return sentence;
        });
        textEl.innerHTML = linked.join(' ');
      }
      header.classList.add('done');

      // Source reference links
      if (data.sources && data.sources.length) {
        srcEl.innerHTML = data.sources.map(s =>
          `<a class="ai-feed-source" href="${s.url}" target="_blank" rel="noopener">
            <img src="https://www.google.com/s2/favicons?domain=${s.domain}&sz=16" alt="">
            <span class="ai-feed-source-domain">${s.domain}</span>
          </a>`
        ).join('');
      }
    } catch (err) {
      if (err.name === 'AbortError') return;
      skeleton.innerHTML = '';
      panel.style.display = 'none';
    }
  }

  // ── INIT ──────────────────────────────────────────────────────────────
  document.getElementById('results-page').style.display = 'none';
</script>
