<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cursor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF8800;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFAA00;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Outer click ring (ripple effect) -->
  <circle cx="280" cy="280" r="120" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.4"/>
  <circle cx="280" cy="280" r="90" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.6"/>

  <!-- Crosshair lines (precision indicator) -->
  <line x1="280" y1="180" x2="280" y2="240" stroke="#FF6600" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="280" y1="320" x2="280" y2="380" stroke="#FF6600" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="200" y1="280" x2="240" y2="280" stroke="#FF6600" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="320" y1="280" x2="360" y2="280" stroke="#FF6600" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Ghost cursor arrow (pointing to center) -->
  <g filter="url(#glow)">
    <path d="M 130 100 L 130 280 L 175 235 L 220 310 L 250 295 L 205 220 L 260 220 Z"
          fill="url(#cursor-grad)" stroke="#FF8800" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- Center dot (the click point) -->
  <circle cx="280" cy="280" r="16" fill="#FF6600" filter="url(#dot-glow)"/>
  <circle cx="280" cy="280" r="8" fill="#FFAA00"/>

  <!-- Text: AC monogram (bottom-right) -->
  <text x="370" y="430" font-family="Segoe UI, Arial, sans-serif" font-weight="700"
        font-size="72" fill="#FF6600" opacity="0.8" letter-spacing="-3">AC</text>
</svg>
